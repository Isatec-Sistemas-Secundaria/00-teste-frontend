<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaverOkire – Login</title>
  <style>
    /* ── VARIABLES: DARK ── */
    :root {
      --page-bg: #0f172a;
      --card-bg: #1e293b;
      --card-shadow: 0 0 0 1px rgba(96,165,250,0.10),
                     0 8px 40px rgba(0,0,0,0.50),
                     0 0 40px rgba(96,165,250,0.07);
      --title-color: #ffffff;
      --subtitle-color: #94a3b8;
      --label-color: #94a3b8;
      --input-bg: #111827;
      --input-border: #334155;
      --input-border-focus: #60a5fa;
      --input-focus-ring: rgba(96,165,250,0.14);
      --placeholder-color: #475569;
      --forgot-color: #60a5fa;
      --btn-bg: #60a5fa;
      --btn-bg-hover: #3b82f6;
      --btn-shadow: rgba(96,165,250,0.30);
      --btn-shadow-hover: rgba(96,165,250,0.42);
      --btn-color: #ffffff;
      --footer-color: #475569;
      --logo-color: #ffffff;
      --error-color: #f87171;
      --error-bg: rgba(248,113,113,0.10);
      --toggle-bg: rgba(255,255,255,0.08);
      --toggle-color: #94a3b8;
      --toggle-hover: rgba(255,255,255,0.14);
      --logout-color: #60a5fa;
      --logout-border: rgba(96,165,250,0.45);
      --logout-hover: rgba(96,165,250,0.10);
    }

    /* ── VARIABLES: LIGHT ── */
    [data-theme="light"] {
      --page-bg: #f8fafc;
      --card-bg: #ffffff;
      --card-shadow: 0 4px 6px rgba(0,0,0,0.04),
                     0 12px 40px rgba(0,0,0,0.10),
                     0 1px 3px rgba(0,0,0,0.06);
      --title-color: #1a1a1a;
      --subtitle-color: #6b7280;
      --label-color: #6b7280;
      --input-bg: #ffffff;
      --input-border: #e2e8f0;
      --input-border-focus: #3b82f6;
      --input-focus-ring: rgba(59,130,246,0.12);
      --placeholder-color: #94a3b8;
      --forgot-color: #3b82f6;
      --btn-bg: #3b82f6;
      --btn-bg-hover: #2563eb;
      --btn-shadow: rgba(59,130,246,0.28);
      --btn-shadow-hover: rgba(59,130,246,0.40);
      --btn-color: #ffffff;
      --footer-color: #9ca3af;
      --logo-color: #3b82f6;
      --error-color: #dc2626;
      --error-bg: rgba(220,38,38,0.06);
      --toggle-bg: rgba(0,0,0,0.06);
      --toggle-color: #6b7280;
      --toggle-hover: rgba(0,0,0,0.10);
      --logout-color: #3b82f6;
      --logout-border: rgba(59,130,246,0.40);
      --logout-hover: rgba(59,130,246,0.08);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--page-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background-color 0.35s ease;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 100;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--toggle-bg);
      color: var(--toggle-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, transform 0.2s;
    }
    .theme-toggle:hover { background: var(--toggle-hover); transform: scale(1.08); }
    .theme-toggle svg { width: 18px; height: 18px; }
    .icon-sun  { display: none; }
    .icon-moon { display: block; }
    [data-theme="light"] .icon-sun  { display: block; }
    [data-theme="light"] .icon-moon { display: none; }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.32s ease, transform 0.32s ease;
      opacity: 1;
      transform: translateY(0px);
      pointer-events: auto;
    }
    .screen.hidden {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 14px;
      box-shadow: var(--card-shadow);
      padding: 40px 44px 32px;
      width: 100%;
      max-width: 358px;
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 26px;
    }
    .logo-circle {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2.5px solid var(--logo-color);
      color: var(--logo-color);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.35s ease, border-color 0.35s ease;
    }

    /* ── TYPOGRAPHY ── */
    .title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--title-color);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.015em;
      transition: color 0.35s ease;
    }
    .subtitle {
      font-size: 0.875rem;
      color: var(--subtitle-color);
      text-align: center;
      margin-bottom: 26px;
      transition: color 0.35s ease;
    }

    /* ── ERROR ── */
    .error-msg {
      font-size: 0.8125rem;
      color: var(--error-color);
      background: var(--error-bg);
      border-radius: 8px;
      text-align: center;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      padding: 0 14px;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
      margin-bottom: 0;
    }
    .error-msg.visible {
      max-height: 60px;
      opacity: 1;
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    /* ── FIELDS ── */
    .field-group { margin-bottom: 15px; }
    .field-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--label-color);
      margin-bottom: 6px;
      transition: color 0.35s ease;
    }
    .field-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      color: var(--title-color);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease,
                  background 0.35s ease, color 0.35s ease;
    }
    .field-input::placeholder { color: var(--placeholder-color); }
    .field-input:focus {
      border-color: var(--input-border-focus);
      box-shadow: 0 0 0 3px var(--input-focus-ring);
    }

    /* ── FORGOT ── */
    .forgot-wrap { text-align: right; margin: -4px 0 20px; }
    .forgot-link {
      font-size: 0.8125rem;
      color: var(--forgot-color);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.75; text-decoration: underline; }

    /* ── LOGIN BUTTON ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-color);
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 14px var(--btn-shadow);
      margin-bottom: 26px;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }
    .btn-login:hover {
      background: var(--btn-bg-hover);
      box-shadow: 0 4px 20px var(--btn-shadow-hover);
    }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    /* ── LOGOUT BUTTON ── */
    .btn-logout {
      display: block;
      margin: 24px auto 26px;
      padding: 9px 30px;
      border-radius: 8px;
      border: 1.5px solid var(--logout-border);
      background: transparent;
      color: var(--logout-color);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .btn-logout:hover { background: var(--logout-hover); }
    .btn-logout:active { transform: scale(0.97); }

    /* ── FOOTER ── */
    .card-footer {
      font-size: 0.75rem;
      color: var(--footer-color);
      text-align: center;
      transition: color 0.35s ease;
    }

    /* ── DASH CARD ── */
    .dash-card { text-align: center; }
    .dash-card .subtitle { margin-bottom: 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 400px) {
      .card { padding: 32px 22px 24px; }
    }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
    <!-- Sun icon -->
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <!-- Moon icon -->
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ── LOGIN SCREEN ── -->
  <div class="screen" id="loginScreen">
    <div class="card">

      <div class="logo-wrap">
        <div class="logo-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 44 44" fill="none">
            <path d="M22 6 A16 16 0 1 1 6 22" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <line x1="14" y1="30" x2="22" y2="14" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
            <line x1="21" y1="30" x2="29" y2="15" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <h1 class="title">Bem-vindo</h1>
      <p class="subtitle">Faça login na sua conta</p>

      <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>

      <div class="field-group">
        <label class="field-label" for="email">E-mail</label>
        <input class="field-input" type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Senha</label>
        <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="forgot-wrap">
        <a href="#" class="forgot-link" id="forgotLink">Esqueceu a senha?</a>
      </div>

      <button class="btn-login" id="loginBtn">Entrar</button>

      <p class="card-footer">© 2026 NaverOkire</p>
    </div>
  </div>

  <!-- ── POST-LOGIN SCREEN ── -->
  <div class="screen hidden" id="dashScreen">
    <div class="card dash-card">

      <div class="logo-wrap">
        <div class="logo-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 44 44" fill="none">
            <path d="M22 6 A16 16 0 1 1 6 22" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <line x1="14" y1="30" x2="22" y2="14" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
            <line x1="21" y1="30" x2="29" y2="15" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <h1 class="title">Obrigado por logar</h1>
      <p class="subtitle">Você está autenticado com sucesso.</p>

      <button class="btn-logout" id="logoutBtn">Sair</button>

      <p class="card-footer">© 2026 NaverOkire</p>
    </div>
  </div>

  <script>
    // ── Credentials ──────────────────────────────────────────
    const VALID_EMAIL    = 'dev@naverokire.com';
    const VALID_PASSWORD = 'password123';

    // ── DOM ──────────────────────────────────────────────────
    const html        = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const loginScreen = document.getElementById('loginScreen');
    const dashScreen  = document.getElementById('dashScreen');
    const emailInput  = document.getElementById('email');
    const passInput   = document.getElementById('password');
    const loginBtn    = document.getElementById('loginBtn');
    const logoutBtn   = document.getElementById('logoutBtn');
    const errorMsg    = document.getElementById('errorMsg');
    const forgotLink  = document.getElementById('forgotLink');

    // ── Theme init ───────────────────────────────────────────
    const savedTheme = localStorage.getItem('naverokire-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('naverokire-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    });

    // ── Screen transitions ───────────────────────────────────
    function showDash() {
      loginScreen.classList.add('hidden');
      setTimeout(() => {
        dashScreen.classList.remove('hidden');
      }, 50);
    }

    function showLogin() {
      dashScreen.classList.add('hidden');
      setTimeout(() => {
        loginScreen.classList.remove('hidden');
        emailInput.value = '';
        passInput.value  = '';
        hideError();
        loginBtn.disabled = false;
        loginBtn.textContent = 'Entrar';
      }, 50);
    }

    // ── Error helpers ─────────────────────────────────────────
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
    function hideError() {
      errorMsg.classList.remove('visible');
    }

    // ── Login ─────────────────────────────────────────────────
    loginBtn.addEventListener('click', handleLogin);
    emailInput.addEventListener('keydown', e => e.key === 'Enter' && passInput.focus());
    passInput.addEventListener('keydown',  e => e.key === 'Enter' && handleLogin());

    function handleLogin() {
      hideError();
      const email = emailInput.value.trim();
      const pass  = passInput.value;

      if (!email || !pass) {
        showError('Por favor, preencha todos os campos.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Entrando…';

      setTimeout(() => {
        if (email === VALID_EMAIL && pass === VALID_PASSWORD) {
          showDash();
        } else {
          showError('Credenciais inválidas. Tente novamente.');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Entrar';
          passInput.value = '';
          passInput.focus();
        }
      }, 220);
    }

    // ── Logout ────────────────────────────────────────────────
    logoutBtn.addEventListener('click', showLogin);

    // ── Forgot password ───────────────────────────────────────
    forgotLink.addEventListener('click', e => {
      e.preventDefault();
      alert('Funcionalidade de recuperação de senha ainda não disponível.');
    });
  </script>
</body>
</html>

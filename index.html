<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Sistemas e Consultoria</title>
  </head>
  <body>
    <div id="form-content">
      <form action="#" method="post">
        <img
          src="./imagens/logo_monocrome.png"
          alt="log_company"
          id="logo_company"
        />
        <div id="title-content">
          <h1>Bem-vindo</h1>
          <p>Faça login na sua conta.</p>
        </div>
        <div class="field-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
          />
        </div>
        <div class="field-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <a href="#" id="forgot-password">Esqueceu a senha?</a>
        </div>
        <button type="submit" id="btn-submit">Entrar</button>
      </form>
      <p id="footer-text">© 2026 Isatec Sistemas e Consultoria</p>
    </div>
  </body>
</html>
